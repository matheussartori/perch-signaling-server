# coturn TURN server for Perch — relays WebRTC media when a direct peer-to-peer
# link can't be established (symmetric NAT / strict firewalls). It carries real
# audio/video/input traffic, so it runs on a VPS with a PUBLIC IP — NOT on Koyeb
# (which doesn't expose the wide UDP relay port range TURN needs).
#
# Replace every REPLACE_ value, then from this folder: `docker compose up -d`.

# ── Network ───────────────────────────────────────────────────────────────
listening-port=3478
# Your VPS's public IPv4. With host networking coturn binds all interfaces, but
# it MUST advertise the public address in the relay candidates it hands out.
external-ip=REPLACE_WITH_PUBLIC_IP

# Port range coturn allocates for relayed media (one port per allocation). Keep
# it modest but enough for your concurrent sessions. Open this UDP range on the
# firewall alongside 3478. ~40 ports is plenty for a personal remote-control app.
min-port=49160
max-port=49200

# ── Auth: long-term credentials ──────────────────────────────────────────
# Perch bakes these into the client bundle (VITE_ICE_SERVERS), so treat them as
# PUBLIC, not secret — the quotas below are what actually cap abuse. To rotate,
# change them here AND in .env, then rebuild the app.
lt-cred-mech
realm=REPLACE_WITH_DOMAIN_OR_IP
user=REPLACE_WITH_USER:REPLACE_WITH_PASSWORD

# ── Abuse limits (the credentials ship in a distributed binary) ───────────
# Max simultaneous relay allocations server-wide, and per credential. A single
# WebRTC session may open a few allocations, so these are generous for 1:1 use.
total-quota=20
user-quota=6
# Optional per-session byte/sec cap. Left off so screen video isn't throttled;
# set e.g. max-bps=3000000 (~3 MB/s) if you want a hard ceiling per session.
# max-bps=0

# ── Hardening ─────────────────────────────────────────────────────────────
fingerprint
no-cli
no-multicast-peers
no-loopback-peers
# Refuse to relay toward private / link-local ranges, so your TURN can't be used
# as a jump box into internal networks.
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# ── Logging ───────────────────────────────────────────────────────────────
log-file=stdout
simple-log
